version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-seu_jwt_secret_seguro}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EFI_CLIENT_ID: ${EFI_CLIENT_ID}
      EFI_CLIENT_SECRET: ${EFI_CLIENT_SECRET}
      EFI_WEBHOOK_URL: ${EFI_WEBHOOK_URL}
      PANEL_ADMIN_USERNAME: ${PANEL_ADMIN_USERNAME}
      PANEL_ADMIN_PASSWORD: ${PANEL_ADMIN_PASSWORD}
      PANEL_URL: ${PANEL_URL:-https://cms.startpainel.cc}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    expose:
      - "3001"
    networks:
      - gestor_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001}
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - gestor_network

networks:
  gestor_network:
    driver: bridge
